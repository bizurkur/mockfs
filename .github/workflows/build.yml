name: Build

on:
    push:
        branches:
            - master
    pull_request:

jobs:
    standards:
        name: Code Standards
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v2

            -
                name: Set up PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: '7.4'
                    extensions: mbstring
                    tools: cs2pr

            -
                name: Validate composer.json and composer.lock
                run: composer validate

            -
                name: Get composer cache directory
                id: composer-cache
                run: |
                    echo "::set-output name=dir::$(composer config cache-files-dir)"

            -
                name: Cache dependencies
                uses: actions/cache@v1
                with:
                    path: ${{ steps.composer-cache.outputs.dir }}
                    key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
                    restore-keys: ${{ runner.os }}-composer-

            -
                name: Install dependencies
                run: composer install --prefer-dist --no-progress --no-suggest

            -
                name: Normalize composer file
                run: composer normalize --dry-run

            -
                name: Lint
                run: vendor/bin/parallel-lint --colors src tests

            -
                name: Codesniffer
                # crank the warning severity because cs2pr treats warnings as failures
                run: |
                    vendor/bin/phpcs -q --warning-severity=10 --report=checkstyle | cs2pr

    tests:
        name: PHP ${{ matrix.php-version }}, ${{ matrix.os }}
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                php-version: ['7.2', '7.3', '7.4']
                # os: [ubuntu-latest, macos-latest, windows-latest]
                os: [ubuntu-latest]

        steps:
            - uses: actions/checkout@v2

            -
                name: Set up PHP ${{ matrix.php-version }}
                uses: shivammathur/setup-php@v2
                with:
                    php-version: ${{ matrix.php-version }}
                    extensions: mbstring
                    tools: cs2pr

            -
                name: Setup Problem Matchers for PHP
                run: |
                    echo "::add-matcher::${{ runner.tool_cache }}/php.json"
                    echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

            -
                name: Validate composer.json and composer.lock
                run: composer validate

            -
                name: Get Composer Cache Directory
                id: composer-cache
                run: |
                    echo "::set-output name=dir::$(composer config cache-files-dir)"

            -
                name: Cache dependencies
                uses: actions/cache@v1
                with:
                    path: ${{ steps.composer-cache.outputs.dir }}
                    key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
                    restore-keys: ${{ runner.os }}-composer-

            -
                name: Install dependencies
                run: composer install --prefer-dist --no-progress --no-suggest

            -
                name: PHPUnit
                if: matrix.php-version != '7.2' || matrix.os != 'ubuntu-latest'
                run: vendor/bin/phpunit

            -
                name: PHPUnit w/ code coverage
                if: matrix.php-version == '7.2' && matrix.os == 'ubuntu-latest'
                run: vendor/bin/phpunit --coverage-clover coverage.xml

            -
                name: Send code coverage to Codacy
                if: matrix.php-version == '7.2' && matrix.os == 'ubuntu-latest'
                env:
                    CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
                run: vendor/bin/codacycoverage clover coverage.xml

    analysis:
        name: Static Analysis
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v2

            -
                name: Set up PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: '7.4'
                    extensions: mbstring
                    tools: cs2pr

            -
                name: Validate composer.json and composer.lock
                run: composer validate

            -
                name: Get Composer Cache Directory
                id: composer-cache
                run: |
                    echo "::set-output name=dir::$(composer config cache-files-dir)"

            -
                name: Cache dependencies
                uses: actions/cache@v1
                with:
                    path: ${{ steps.composer-cache.outputs.dir }}
                    key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
                    restore-keys: ${{ runner.os }}-composer-

            -
                name: Install dependencies
                run: composer install --prefer-dist --no-progress --no-suggest

            -
                name: Static Analysis
                run: vendor/bin/phpstan analyse --error-format=checkstyle | sed '/^$/d' | cs2pr

    mutation:
        name: Mutation Testing
        runs-on: ubuntu-latest
        needs: tests

        steps:
            - uses: actions/checkout@v2

            -
                name: Set up PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: '7.4'
                    extensions: mbstring
                    tools: cs2pr

            -
                name: Validate composer.json and composer.lock
                run: composer validate

            -
                name: Get Composer Cache Directory
                id: composer-cache
                run: |
                    echo "::set-output name=dir::$(composer config cache-files-dir)"

            -
                name: Cache dependencies
                uses: actions/cache@v1
                with:
                    path: ${{ steps.composer-cache.outputs.dir }}
                    key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
                    restore-keys: ${{ runner.os }}-composer-

            -
                name: Install dependencies
                run: composer install --prefer-dist --no-progress --no-suggest

            -
                name: Mutation Testing
                run: phpdbq -qrr -d memory_limit=-1 vendor/bin/infection --threads=4 --min-msi=80 --min-covered-msi=80
